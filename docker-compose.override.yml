# docker-compose.override.yml — Development overrides only.
#
# Docker Compose auto-merges this file with docker-compose.yml when running
# locally (docker compose up). It is NOT loaded in production deployments that
# use explicit -f flags pointing only at docker-compose.yml.
#
# Bind mounts here allow hot-reload in development but are intentionally absent
# from the base docker-compose.yml to prevent host-file exposure in production.

version: "3.9"

services:
  backend:
    volumes:
      - ./backend:/app

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: test_ignoranza_artificiale
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
